<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Argument Balance Scale</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: #fff;
    padding: 30px 20px;
  }

  .screen-only {
    text-align: center;
    margin-bottom: 24px;
  }
  .screen-only h1 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .screen-only p { font-size: 12px; color: #888; margin-bottom: 12px; }
  .print-btn {
    padding: 8px 24px;
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .print-btn:hover { opacity: 0.9; }

  .page {
    max-width: 700px;
    margin: 0 auto;
  }

  .title {
    text-align: center;
    font-size: 16px;
    font-weight: 800;
    color: #1a1a2e;
    margin-bottom: 20px;
  }

  /* ---- Scale layout ---- */
  .scale {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    width: 100%;
    margin-bottom: 0;
  }

  .col {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* Claim labels */
  .claim-label {
    border: 2px solid #6b9da8;
    border-radius: 12px;
    padding: 12px 16px;
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    color: #333;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Evidence boxes */
  .evidence-box {
    border: 2px solid #6b9da8;
    border-radius: 14px;
    min-height: 110px;
  }

  /* Balance bar */
  .bar-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 14px;
  }

  .bar {
    width: 100%;
    height: 32px;
    border: 2px solid #6b9da8;
    border-radius: 4px;
  }

  /* Triangle fulcrum */
  .fulcrum {
    width: 0;
    height: 0;
    border-left: 36px solid transparent;
    border-right: 36px solid transparent;
    border-top: 48px solid #4e8a95;
    margin-top: -1px;
  }

  /* Name/Date line */
  .meta-line {
    display: flex;
    gap: 30px;
    margin-top: 24px;
    justify-content: center;
  }
  .meta-field {
    font-size: 12px;
    font-weight: 600;
    color: #555;
  }
  .meta-blank {
    display: inline-block;
    width: 160px;
    border-bottom: 1px solid #ccc;
    margin-left: 6px;
  }
  .meta-blank.wide { width: 200px; }

  @media print {
    body { padding: 0.4in; }
    .screen-only { display: none; }
  }
  @page {
    margin: 0.5in;
    size: portrait;
  }
</style>
</head>
<body>

<div class="screen-only">
  <h1>Argument Balance Scale</h1>
  <p>Blank graphic organizer &mdash; print or save as PDF</p>
  <button class="print-btn" onclick="window.print()">Print / Save as PDF</button>
</div>

<div class="page">
  <div class="title">Argument Balance Scale</div>

  <div class="scale">
    <div class="columns">
      <div class="col">
        <div class="claim-label">Idea (Claim)</div>
        <div class="evidence-box"></div>
        <div class="evidence-box"></div>
        <div class="evidence-box"></div>
      </div>
      <div class="col">
        <div class="claim-label">Competing Idea (Claim)</div>
        <div class="evidence-box"></div>
        <div class="evidence-box"></div>
        <div class="evidence-box"></div>
      </div>
    </div>

    <div class="bar-wrap">
      <div class="bar"></div>
      <div class="fulcrum"></div>
    </div>
  </div>

  <div class="meta-line">
    <div class="meta-field">Name: <span class="meta-blank"></span></div>
    <div class="meta-field">Date: <span class="meta-blank"></span></div>
    <div class="meta-field">Topic: <span class="meta-blank wide"></span></div>
  </div>
</div>

<script src="/auth.js"></script>
</body>
</html>
