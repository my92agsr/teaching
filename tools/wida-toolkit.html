<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WIDA x Zwiers Teaching Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f4f5f9;min-height:100vh}
button{font-family:'DM Sans',sans-serif}
input,textarea{font-family:'DM Sans',sans-serif}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState}=React;

const DOMAINS=[
{name:"Listening",icon:"\u{1F442}",color:"#5B8DBE",lightBg:"#EDF3F9"},
{name:"Speaking",icon:"\u{1F5E3}\uFE0F",color:"#E07A5F",lightBg:"#FDF0ED"},
{name:"Reading",icon:"\u{1F4D6}",color:"#6A9B4F",lightBg:"#EFF5EB"},
{name:"Writing",icon:"\u270D\uFE0F",color:"#7A3A96",lightBg:"#F4EBF7"},
{name:"Interact",icon:"\u{1F4AC}",color:"#C4880D",lightBg:"#FBF5E6",isNew:true}
];

const KLUS=[
{name:"Narrate",icon:"\u{1F4D5}",color:"#C05740",tagline:"Tell the story"},
{name:"Inform",icon:"\u{1F4CB}",color:"#2E6FA8",tagline:"Present the facts"},
{name:"Explain",icon:"\u{1F52C}",color:"#558B3A",tagline:"Unpack the why & how"},
{name:"Argue",icon:"\u2696\uFE0F",color:"#7A3A96",tagline:"Make your case"}
];

const MATRIX={
"Listening\xD7Narrate":{title:"Listening to Narrate",classroom:"Students listen to a recorded oral history from a WWII veteran and identify narrative elements \u2014 setting, complication, resolution.",task:"Listen to the audio testimony. What was the turning point? Note the sequence of events.",stems:["The speaker described\u2026","First\u2026 then\u2026 after that\u2026","The story shifted when\u2026"],proficiency:{low:"Identify key events using a visual timeline while listening",high:"Analyze how the narrator\u2019s tone shifts to signal the complication and resolution"}},
"Listening\xD7Inform":{title:"Listening to Inform",classroom:"Students listen to a teacher\u2019s presentation on the water cycle and take structured notes to organize factual information.",task:"Categorize each stage of the water cycle into the correct section of your graphic organizer.",stems:["The main stages are\u2026","This is classified as\u2026","Compared to evaporation, condensation\u2026"],proficiency:{low:"Match spoken key terms to labeled images",high:"Synthesize the presentation into a written summary with technical vocabulary"}},
"Listening\xD7Explain":{title:"Listening to Explain",classroom:"Students listen to a peer explain their math solution strategy and evaluate whether the reasoning is sequential and complete.",task:"Can you identify every step? Is there a gap in the causal chain?",stems:["They said this happens because\u2026","The step I\u2019m missing is\u2026","So the cause of ___ is\u2026"],proficiency:{low:"Follow along with a visual flowchart as the partner explains",high:"Identify logical gaps and suggest where the explanation breaks down"}},
"Listening\xD7Argue":{title:"Listening to Argue",classroom:"Students listen to a structured debate and evaluate the strength of each side\u2019s evidence and reasoning.",task:"Rate each argument: Is the claim clear? Is the evidence strong? Does the reasoning connect them?",stems:["Their strongest point was\u2026","The evidence didn\u2019t support\u2026 because\u2026","A counterclaim could be\u2026"],proficiency:{low:"Use a T-chart to sort claims from each side",high:"Evaluate which side used more compelling evidence and explain why"}},
"Speaking\xD7Narrate":{title:"Speaking to Narrate",classroom:"Students orally retell a personal experience connected to a social studies immigration unit.",task:"Share your family\u2019s story of moving to a new place. Include context, events, and outcome.",stems:["It all started when\u2026","The hardest part was\u2026","In the end\u2026"],proficiency:{low:"Retell using sentence frames and a sequenced picture prompt",high:"Deliver a polished oral narrative with descriptive language and reflective commentary"}},
"Speaking\xD7Inform":{title:"Speaking to Inform",classroom:"Students give a short oral presentation comparing two ecosystems.",task:"Present to your group: How are the desert and rainforest similar and different?",stems:["Both ecosystems have\u2026","Unlike the desert, the rainforest\u2026","This can be categorized as\u2026"],proficiency:{low:"Use a Venn diagram as visual support while speaking",high:"Present fluently with embedded comparisons and domain-specific terminology"}},
"Speaking\xD7Explain":{title:"Speaking to Explain",classroom:"Students verbally walk through their math problem-solving process.",task:"Explain to your partner how you solved the equation. Walk through your reasoning.",stems:["First I\u2026 because\u2026","This step works because\u2026","The reason I chose this method is\u2026"],proficiency:{low:"Point to a completed worked example and explain each step",high:"Explain the strategy AND why alternatives would or wouldn\u2019t work"}},
"Speaking\xD7Argue":{title:"Speaking to Argue",classroom:"Students defend a position in a structured academic debate on a current issue.",task:"State your claim, support it with two pieces of evidence, and address one counterclaim.",stems:["I claim that\u2026 because\u2026","According to the source\u2026","While opponents argue\u2026, the evidence shows\u2026"],proficiency:{low:"Use claim-evidence-reasoning sentence frames",high:"Deliver a fluid argument with embedded rebuttals"}},
"Reading\xD7Narrate":{title:"Reading to Narrate",classroom:"Students read a historical narrative about a soldier\u2019s WWI experience and analyze narrative techniques.",task:"How does the author use sequence and detail to convey the tension of trench warfare?",stems:["The author builds tension by\u2026","The sequence shows\u2026","This detail suggests\u2026"],proficiency:{low:"Use a story map to track characters, setting, and events",high:"Analyze the author\u2019s narrative choices and their effect on the reader"}},
"Reading\xD7Inform":{title:"Reading to Inform",classroom:"Students read an informational text about types of government and extract, organize, and compare key facts.",task:"Create a chart comparing democracy, monarchy, and dictatorship across three categories.",stems:["According to the text\u2026","One key difference is\u2026","Both systems share\u2026"],proficiency:{low:"Highlight key facts in a modified text with annotations",high:"Synthesize across multiple sources into an original comparison"}},
"Reading\xD7Explain":{title:"Reading to Explain",classroom:"Students read a science text explaining photosynthesis and trace the causal process.",task:"Map out each step of photosynthesis as a cause-and-effect chain.",stems:["This happens because\u2026","The next step is\u2026","As a result of\u2026"],proficiency:{low:"Match labeled diagrams to corresponding text sections",high:"Evaluate whether the text\u2019s explanation is complete"}},
"Reading\xD7Argue":{title:"Reading to Argue",classroom:"Students read an editorial and identify the author\u2019s claim, evidence, and reasoning.",task:"What is the author arguing? What evidence do they use? Is it convincing?",stems:["The author claims that\u2026","They support this with\u2026","This evidence is/isn\u2019t convincing because\u2026"],proficiency:{low:"Use a graphic organizer to separate claim, evidence, reasoning",high:"Write a critical response evaluating the argument\u2019s strength"}},
"Writing\xD7Narrate":{title:"Writing to Narrate",classroom:"Students write a personal narrative connecting a family tradition to a cultural studies unit.",task:"Write a story about a family tradition. Orient the reader, develop events, reflect on meaning.",stems:["It was the first time I\u2026","Everything changed when\u2026","Looking back, I realize\u2026"],proficiency:{low:"Use a story map template and sentence frames",high:"Craft a polished narrative with literary techniques and dialogue"}},
"Writing\xD7Inform":{title:"Writing to Inform",classroom:"Students write a research report presenting factual information about a country.",task:"Include sections on geography, government, economy, and culture.",stems:["___ is located in\u2026","The economy relies on\u2026","One key feature is\u2026"],proficiency:{low:"Fill in a structured template with word banks",high:"Write an original multi-paragraph report with source citations"}},
"Writing\xD7Explain":{title:"Writing to Explain",classroom:"Students write a lab report explaining why their experiment produced specific results.",task:"Explain WHY the plant in sunlight grew more than the one in the dark.",stems:["The data shows that\u2026 because\u2026","This occurred as a result of\u2026","The evidence supports\u2026"],proficiency:{low:"Use a cause-effect graphic organizer to draft",high:"Write a detailed explanation connecting results to the scientific concept"}},
"Writing\xD7Argue":{title:"Writing to Argue",classroom:"Students write a persuasive essay on a social issue using text evidence from multiple sources.",task:"Should the school switch to a four-day week? Use evidence from at least two sources.",stems:["I argue that\u2026 because\u2026","The strongest evidence is\u2026","Critics may say\u2026, however\u2026"],proficiency:{low:"Use a claim-evidence-reasoning template",high:"Write a nuanced argument with embedded counterclaims"}},
"Interact\xD7Narrate":{title:"Interact to Narrate",classroom:"Partners co-narrate a shared experience, building on each other\u2019s contributions to create a richer account than either could produce alone.",task:"Retell yesterday\u2019s story with your partner \u2014 build on each other\u2019s details. One starts, the other adds.",stems:["And then what happened was\u2026","Don\u2019t forget the part where\u2026","I\u2019d add that the character also\u2026","Putting our versions together\u2026"],proficiency:{low:"Take turns describing a picture sequence, building on partner\u2019s words",high:"Collaboratively construct a retelling that includes interpretation"},zwpiersSkills:["Elaborate & Clarify","Build On"],whyInteract:"Solo narration is a monologue. Interactive narration is a dialogue \u2014 students negotiate what\u2019s important, fill gaps, and co-construct a richer version."},
"Interact\xD7Inform":{title:"Interact to Inform",classroom:"Pairs negotiate which information is most important from sources, co-organizing and prioritizing facts through dialogue.",task:"Each read a different source about climate change. Decide together: What are the 3 most important facts?",stems:["I think the most important fact is\u2026 because\u2026","Should we put this under ___ or ___?","I\u2019d rank that differently because\u2026","So we agree that\u2026"],proficiency:{low:"Sort fact cards together through discussion",high:"Negotiate a shared organizational framework, resolving disagreements"},zwpiersSkills:["Negotiate Meaning","Support with Evidence"],whyInteract:"Solo informing is reporting. Interactive informing is curation \u2014 students negotiate what matters and co-construct organizational logic."},
"Interact\xD7Explain":{title:"Interact to Explain",classroom:"Partners co-explain a concept through dialogue, filling understanding gaps and surfacing misconceptions.",task:"Explain how a bill becomes a law together. Take turns \u2014 one explains a step, the other asks questions or adds.",stems:["So first what happens is\u2026","Wait, say more about that step?","There\u2019s a piece missing between\u2026","Oh right, that connects to\u2026"],proficiency:{low:"Use a partially completed flowchart, take turns filling in steps",high:"Co-construct a complete causal explanation, identifying where understandings differed"},zwpiersSkills:["Elaborate & Clarify","Negotiate Meaning"],whyInteract:"Solo explaining reveals what one student knows. Interactive explaining reveals what two students almost know \u2014 dialogue surfaces the gaps."},
"Interact\xD7Argue":{title:"Interact to Argue",classroom:"Students stress-test arguments through structured conversation before writing \u2014 challenging claims, weighing evidence, refining positions.",task:"Share your claim and evidence with a partner. Their job: challenge it. Then switch.",stems:["My claim is\u2026 and my strongest evidence is\u2026","I see it differently because\u2026","What would you say to someone who argues\u2026?","You\u2019ve convinced me that\u2026, but I still think\u2026"],proficiency:{low:"Use argument cards and practice challenging one at a time",high:"Extended conversation where both partners refine positions through challenges"},zwpiersSkills:["Build On & Challenge","Support with Evidence","Synthesize"],whyInteract:"Written arguments are static. Interactive argument is dynamic \u2014 claims get challenged in real time and positions evolve through conversation."}
};

const CONV_SKILLS=[
{name:"Elaborate & Clarify",icon:"\u{1F50D}",color:"#3D85C6",description:"Expand on ideas or make them clearer. Push beyond surface-level responses into deeper, more detailed thinking.",stems:["Can you tell me more about\u2026?","What do you mean by\u2026?","I think what you\u2019re saying is\u2026","To add to that\u2026","An example of that would be\u2026"],teacherMoves:["Model elaboration with think-alouds","Use \u2018Say More\u2019 as a classroom norm","Provide elaboration sentence frames on table cards"],graphicOrg:{name:"Idea Building Bricks",description:"Write a big idea in an oval at the top. Students add \u2018bricks\u2019 underneath \u2014 each brick is a detail, example, connection, or question that builds up the idea. Bricks that don\u2019t relate get placed to the side.",howToUse:"Give pairs an idea statement. Each partner writes bricks on slips of paper and shares them, using elaboration language. Together they arrange bricks into a wall, deciding which ones best support the idea.",forKLUs:["Inform","Explain"]}},
{name:"Support with Evidence",icon:"\u{1F4DA}",color:"#6A9B4F",description:"Strengthen ideas with examples, text references, data, or reasoning. Move from opinion to substantiated thinking.",stems:["The text says\u2026 which supports\u2026","For example\u2026","This connects to\u2026 because\u2026","The evidence for this is\u2026","An example from my life is\u2026"],teacherMoves:["Ask \u2018What makes you say that?\u2019 consistently","Teach the difference between strong and weak evidence","Use evidence strength rating scales"],graphicOrg:{name:"Evidence Strength Arrows",description:"Write a claim in the top box. Below, draw arrows of varying widths. Each arrow is evidence \u2014 stronger evidence gets a thicker arrow. Students discuss and rate each piece.",howToUse:"Partners generate evidence for a claim, write each on an arrow, then discuss: Is this strong or weak support? They assign arrow thickness and arrange strongest to weakest.",forKLUs:["Argue","Explain"]}},
{name:"Build On & Challenge",icon:"\u{1F3D7}\uFE0F",color:"#E07A5F",description:"Extend a partner\u2019s thinking or respectfully push back. This is where ideas get sharpened through intellectual friction.",stems:["I agree, and I\u2019d add that\u2026","I see it differently because\u2026","What about the possibility that\u2026?","That\u2019s interesting, but what if\u2026","Building on your idea\u2026"],teacherMoves:["Normalize respectful disagreement","Use \u2018Yes, and\u2026\u2019 vs \u2018Yes, but\u2026\u2019 practice","Model how to challenge without attacking"],graphicOrg:{name:"Argument Balance Scale",description:"Draw a balance scale. One side holds arguments FOR, the other AGAINST. Students collaboratively place evidence on each side and discuss which way the scale tips.",howToUse:"Partners take opposing sides of an issue. They take turns adding evidence. After each round: Which side is stronger? What would tip the balance?",forKLUs:["Argue"]}},
{name:"Paraphrase",icon:"\u{1F501}",color:"#8E44AD",description:"Restate a partner\u2019s idea in your own words to confirm understanding. The active listening skill that fuels real dialogue.",stems:["So you\u2019re saying that\u2026","Let me see if I understand\u2026","In other words\u2026","What I hear you saying is\u2026","To put it another way\u2026"],teacherMoves:["Require paraphrase before responding","Use Sharing Cards (partner writes paraphrased version)","Practice \u2018paraphrase rounds\u2019 where every response starts with a restatement"],graphicOrg:{name:"Sharing Cards / Interview Grid",description:"Partner A holds blank cards for Partner B. When B shares, A writes a paraphrased version on a card. If one partner has too many cards, the imbalance is visible \u2014 equity of voice becomes concrete.",howToUse:"Use during structured pair conversations. Alternatively, use an Interview Grid matrix where students circulate, ask academic questions, and paraphrase answers in small boxes.",forKLUs:["Inform","Narrate"]}},
{name:"Synthesize",icon:"\u{1F9E9}",color:"#C4880D",description:"Pull threads together into a unified understanding. The capstone skill \u2014 where dialogue produces something new.",stems:["So what we\u2019ve figured out is\u2026","Putting our ideas together\u2026","The main takeaway is\u2026","We started thinking ___ but now we think\u2026","Our conversation changed my thinking because\u2026"],teacherMoves:["End conversations with a synthesis prompt","Use \u2018What did we build?\u2019 as a closing routine","Have pairs write a joint synthesis statement"],graphicOrg:{name:"Conversation Planning & Synthesis Form",description:"Two-column form: Left for pre-conversation thinking (initial ideas, questions, evidence). Right for post-conversation synthesis (what changed, what we built, new questions).",howToUse:"Students fill the left column before the conversation. During, they refer to it. After, they fill the right column reflecting on how thinking evolved through dialogue.",forKLUs:["All KLUs"]}}
];

const PROTOCOLS=[
{name:"Constructive Conversations",source:"Zwiers, O\u2019Hara & Pritchard (2014)",icon:"\u{1F3D7}\uFE0F",color:"#C4880D",description:"Zwiers\u2019 own framework. Four moves: Create an idea, Fortify it with evidence, Negotiate by considering other perspectives, Clarify to deepen understanding.",skills:["Create","Fortify","Negotiate","Clarify"],bestFor:["Argue","Explain"],steps:["Teacher poses a prompt connected to content","Partner A creates an idea","Partner B asks to fortify: \u2018What makes you say that?\u2019","Both negotiate: \u2018But what about\u2026?\u2019","Both clarify: \u2018So what we\u2019re really saying is\u2026\u2019"],elScaffold:"Use visual Constructive Conversation Skills poster. Color-code each move. Start with just Create + Fortify for newcomers, add Negotiate + Clarify as proficiency grows."},
{name:"Think-Pair-Share (Academic)",source:"Lyman (1981) / adapted by Zwiers",icon:"\u{1F4AD}",color:"#3D85C6",description:"The classic \u2014 upgraded. Think individually, pair for a structured academic conversation (not just \u2018turn and talk\u2019), share a synthesized idea.",skills:["Elaborate & Clarify","Paraphrase"],bestFor:["Inform","Explain"],steps:["Think: Silent individual processing (30\u201360 sec)","Pair: Structured conversation using stems and skills","Share: Pairs report a SYNTHESIZED idea, not just one person\u2019s answer"],elScaffold:"Provide conversation stems on cards. Give Think time with a graphic organizer. For Share, let pairs present together so neither carries the full language load alone."},
{name:"Socratic Seminar",source:"Adapted from Socratic method",icon:"\u{1F3DB}\uFE0F",color:"#7A3A96",description:"Student-led discussion in a circle. One group discusses while another observes and provides feedback. Pushes building on, challenging, and citing evidence.",skills:["Build On & Challenge","Support with Evidence","Synthesize"],bestFor:["Argue","Narrate"],steps:["Students prepare with text annotations and questions","Inner circle discusses the text/prompt","Outer circle observes using a Conversation Analysis Tool","Debrief: What skills did we use? Where did we go deep?"],elScaffold:"Pre-teach key vocabulary. Provide annotated text with guiding questions. Let ELs prepare written notes beforehand. Use observer role as an entry point for lower-proficiency students."},
{name:"Idea Building Cards",source:"Zwiers (2019)",icon:"\u{1F9F1}",color:"#E07A5F",description:"Students write ideas on cards and physically build them up through conversation. Makes abstract idea development concrete and visible.",skills:["Elaborate & Clarify","Build On & Challenge"],bestFor:["Explain","Inform"],steps:["Teacher provides a topic or prompt","Each student writes 2\u20133 initial idea cards","Partners share cards and discuss connections","Together they arrange cards into a visual structure","Partners identify gaps and create new cards to fill them"],elScaffold:"Pre-populate some cards with vocabulary or partial ideas. Use color-coded cards (blue = facts, green = examples, yellow = questions). Allow L1 on cards for newcomers."},
{name:"Argument Balance Scale",source:"Zwiers & Crawford (2011)",icon:"\u2696\uFE0F",color:"#558B3A",description:"Partners collaboratively weigh evidence for and against a claim. Makes evaluating argument strength concrete and discussable.",skills:["Support with Evidence","Build On & Challenge","Synthesize"],bestFor:["Argue"],steps:["Draw or display a balance scale graphic","Partners take turns placing evidence on FOR and AGAINST sides","After each piece, discuss: How much weight does this carry?","Evaluate together: Which way does the scale tip? Why?","Synthesize: Write a claim reflecting the strongest evidence"],elScaffold:"Provide evidence cards from the text. Use visual weight indicators. Sentence frames: \u2018This evidence is strong/weak because\u2026\u2019"},
{name:"Conversation Analysis Tool (CAT)",source:"Hakuta, Zwiers & Rutherford-Quach (2013)",icon:"\u{1F4CB}",color:"#8E44AD",description:"A meta-tool: observe a conversation and analyze which skills are used, where it goes deep, where it stays surface-level. Builds metacognitive awareness.",skills:["All five skills"],bestFor:["All KLUs"],steps:["One pair converses while an observer uses the CAT form","Observer tallies which conversation skills are used","Observer notes moments of depth vs surface-level exchange","Triad debriefs: What worked? What skills were missing?","Set a goal for the next conversation"],elScaffold:"Simplify CAT form to track just 2\u20133 skills. Use visual icons for each skill. Observer role is excellent for students building receptive language while developing metalinguistic awareness."}
];

function MatrixView(){
const[aD,setAD]=useState(4);
const[aK,setAK]=useState(3);
const[showP,setShowP]=useState(false);
const d=DOMAINS[aD],k=KLUS[aK];
const cell=MATRIX[d.name+"\xD7"+k.name];
const isI=d.name==="Interact";
return <div>
<div style={{marginBottom:"8px"}}>
<p style={{fontSize:"10px",fontWeight:700,letterSpacing:"1.5px",color:"#bbb",textTransform:"uppercase",margin:"0 0 8px 2px"}}>{"\u2460"} Domain (the channel)</p>
<div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
{DOMAINS.map((dm,i)=><button key={dm.name} onClick={()=>setAD(i)} style={{display:"flex",alignItems:"center",gap:"6px",padding:"9px 14px",background:aD===i?dm.color:"#fff",color:aD===i?"#fff":dm.color,border:"2px solid "+(aD===i?dm.color:"#e0e0e0"),borderRadius:"10px",cursor:"pointer",fontSize:"13px",fontWeight:aD===i?800:600,boxShadow:aD===i?"0 3px 12px "+dm.color+"30":"none",whiteSpace:"nowrap",transition:"all 0.2s"}}><span style={{fontSize:"16px"}}>{dm.icon}</span>{dm.name}{dm.isNew&&<span style={{fontSize:"7px",fontWeight:800,background:aD===i?"rgba(255,255,255,0.3)":dm.color,color:"#fff",padding:"2px 6px",borderRadius:"4px",letterSpacing:"1px"}}>5TH</span>}</button>)}
</div></div>
{aD===4&&<div style={{background:"linear-gradient(135deg,#FBF5E6,#fff)",border:"1px solid #C4880D33",borderRadius:"10px",padding:"12px 18px",margin:"8px 0"}}><p style={{margin:0,fontSize:"12px",color:"#777",lineHeight:1.7}}><strong style={{color:"#C4880D"}}>The 5th Domain:</strong> Zwiers argues academic conversation is a distinct mode \u2014 not just Speaking, but the co-construction of meaning through dialogue.</p></div>}
<div style={{marginTop:"16px"}}>
<p style={{fontSize:"10px",fontWeight:700,letterSpacing:"1.5px",color:"#bbb",textTransform:"uppercase",margin:"0 0 8px 2px"}}>{"\u2461"} KLU (the purpose)</p>
<div style={{display:"flex",gap:"6px"}}>
{KLUS.map((kl,i)=><button key={kl.name} onClick={()=>{setAK(i);setShowP(false)}} style={{flex:1,padding:"12px 6px",background:aK===i?"#fff":"#fafafa",border:"1px solid #e8e8e8",borderBottom:aK===i?"3px solid "+d.color:"3px solid transparent",borderRadius:"10px 10px 0 0",cursor:"pointer",textAlign:"center",transition:"all 0.2s"}}><div style={{fontSize:"18px",marginBottom:"2px"}}>{kl.icon}</div><div style={{fontSize:"12px",fontWeight:aK===i?800:600,color:aK===i?d.color:"#888"}}>{kl.name}</div></button>)}
</div></div>
{cell&&<div style={{background:"#fff",borderRadius:"0 0 14px 14px",border:"1px solid #e8e8e8",borderTop:"none",padding:"24px"}}>
<div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}}><span style={{background:d.color,color:"#fff",padding:"3px 10px",borderRadius:"6px",fontSize:"10px",fontWeight:700}}>{d.name}</span><span style={{color:"#ccc"}}>{"\xD7"}</span><span style={{background:k.color,color:"#fff",padding:"3px 10px",borderRadius:"6px",fontSize:"10px",fontWeight:700}}>{k.name}</span></div>
<h3 style={{fontSize:"20px",fontWeight:800,color:"#1a1a2e",margin:"6px 0 14px"}}>{cell.title}</h3>
{isI&&cell.whyInteract&&<div style={{background:"linear-gradient(135deg,"+d.lightBg+",#fff)",borderRadius:"10px",padding:"14px 18px",marginBottom:"16px",borderLeft:"4px solid "+d.color}}><p style={{margin:"0 0 4px",fontSize:"10px",fontWeight:800,color:d.color,textTransform:"uppercase",letterSpacing:"1px"}}>Why Interact changes this</p><p style={{margin:0,fontSize:"13px",color:"#444",lineHeight:1.7}}>{cell.whyInteract}</p></div>}
<p style={{fontSize:"10px",fontWeight:700,color:"#bbb",textTransform:"uppercase",letterSpacing:"1px",margin:"0 0 6px"}}>Classroom Scenario</p>
<p style={{fontSize:"13px",color:"#333",lineHeight:1.7,margin:"0 0 14px",background:"#fafafa",padding:"12px 16px",borderRadius:"8px"}}>{cell.classroom}</p>
<p style={{fontSize:"10px",fontWeight:700,color:"#bbb",textTransform:"uppercase",letterSpacing:"1px",margin:"0 0 6px"}}>Sample Task</p>
<div style={{background:d.lightBg,borderRadius:"8px",padding:"12px 16px",borderLeft:"3px solid "+d.color,marginBottom:"14px"}}><p style={{margin:0,fontSize:"13px",color:"#333",lineHeight:1.6}}>{cell.task}</p></div>
<p style={{fontSize:"10px",fontWeight:700,color:"#bbb",textTransform:"uppercase",letterSpacing:"1px",margin:"0 0 8px"}}>Language Stems</p>
<div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"14px"}}>{cell.stems.map((s,i)=><span key={i} style={{background:"#fff",border:"1px solid "+d.color+"33",padding:"5px 12px",borderRadius:"16px",fontSize:"11px",color:"#555",fontStyle:"italic"}}>{"\u201C"}{s}{"\u201D"}</span>)}</div>
{isI&&cell.zwpiersSkills&&<><p style={{fontSize:"10px",fontWeight:700,color:"#bbb",textTransform:"uppercase",letterSpacing:"1px",margin:"0 0 8px"}}>Zwiers Skills</p><div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"14px"}}>{cell.zwpiersSkills.map((s,i)=><span key={i} style={{background:d.color,color:"#fff",padding:"4px 12px",borderRadius:"16px",fontSize:"11px",fontWeight:600}}>{s}</span>)}</div></>}
<button onClick={()=>setShowP(!showP)} style={{background:"none",border:"none",cursor:"pointer",padding:0,fontSize:"10px",fontWeight:700,color:d.color,textTransform:"uppercase",letterSpacing:"1px"}}>{showP?"\u25BE":"\u25B8"} Proficiency Differentiation</button>
