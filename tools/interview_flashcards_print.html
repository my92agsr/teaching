<style>

  }

  .print-btn:active { transform: scale(0.97); }

  /* ---- Card Grid ---- */
  .page {
    max-width: 720px;
    margin: 0 auto;
  }

  .card {
    border: 1px solid #e0e0e0;
    border-radius: 12px;
    margin-bottom: 20px;
    overflow: hidden;
    background: #fff;
    break-inside: avoid;
    page-break-inside: avoid;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px 12px;
    border-bottom: 1px solid #f0f0f0;
  }
  .card-num {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 400;
    color: #999;
    min-width: 20px;
  }
  .card-dot {
    width: 8px;
    height: 8px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .card-question {
    font-size: 15px;
    font-weight: 700;
    color: #1a1a2e;
    line-height: 1.4;
  }

  .card-body {
    padding: 14px 20px 18px;
    font-size: 12px;
    line-height: 1.65;
    color: #333;
  }

  .card-body .section-head {
    font-family: var(--mono);
    font-size: 8.5px;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    display: block;
    margin: 12px 0 4px 0;
    color: #999;
    font-weight: 400;
  }

    margin-top: 0;
  }
  .card-body strong {
    font-weight: 700;
    color: #1a1a2e;
  }
  .card-body ul {
    margin: 3px 0 3px 16px;
    padding: 0;
  }
  .card-body li {
    margin-bottom: 2px;
  }

  .card:nth-child(3n) {
    margin-bottom: 0;
    break-after: page;
    page-break-after: always;
  }

  /* ---- Print styles ---- */

    body {
      background: #fff;
      padding: 0;
      font-size: 11px;
    }
    .screen-header { display: none; }
    .page { max-width: 100%; }

      border: 1px solid #ccc;

      margin-bottom: 14px;

    margin: 0.5in 0.6in;

</style>
</head>
