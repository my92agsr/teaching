{question:"Tell me about your teaching philosophy.",sections:[0,1,2],guidance:"Lead with meaning-making as the purpose, interaction as the engine, then hooks on community. Ground in your framework hierarchy.",
starters:[
"Education exists for one purpose: meaning-making. Not memorization, not compliance, not test preparation \u2014 but the genuine construction of new understanding. Freire showed us that the banking model, where teachers deposit information into passive students, suppresses the very thing education should cultivate. My classroom flips that \u2014 every activity I design asks one question: are students making meaning together? And the key word is together, because meaning-making happens most powerfully through interaction. Zwiers identifies interaction as a 5th domain of language use, alongside reading, writing, listening, and speaking \u2014 and I believe it\u2019s the missing piece in most classrooms. When students build ideas face to face, clarify each other\u2019s thinking, support claims with evidence, and evaluate arguments together, they\u2019re doing the work that education was always supposed to be about.",
"The relational conditions for this come from bell hooks, who insists that the teacher must show up as a whole, vulnerable person \u2014 not a detached facilitator. So every student I encounter is deserving of my time, my respect, my enthusiasm, and a smile \u2014 before they\u2019ve earned anything. That\u2019s not idealism; it\u2019s the prerequisite for the kind of idea-building Zwiers describes. Students won\u2019t take the intellectual risk of posing a buildable idea if they don\u2019t feel safe. hooks and Zwiers converge here: Zwiers draws on the Bantu concept of ubuntu \u2014 a person becomes a person through other people \u2014 and hooks says learning only happens in genuine community.",
"The practical architecture connects Walqui\u2019s scaffolding \u2014 amplify, don\u2019t simplify \u2014 with translanguaging, which ensures every student can deploy their full linguistic repertoire. Zwiers\u2019 conversation structures \u2014 QSSSA, Stronger and Clearer, Write-Converse-Write \u2014 provide the interaction framework, and I scaffold them so that a WIDA Level 1 student and a Level 5 student can both make meaning in the same conversation. All four WIDA domains \u2014 listening, speaking, reading, and writing \u2014 are activated because the interaction demands them. 26 of 29 students demonstrated understanding after a single lesson built this way."
]},
{question:"How do you differentiate instruction?",sections:[3,4,2],guidance:"Lead with meaning-making for every student, then Zwiers\u2019 conversation structures as built-in differentiation, scaffolding and translanguaging.",
starters:[
"Meaningful differentiation starts from a principle: every student in the room should be making meaning, not just the ones who already have the language to do it easily. Zwiers\u2019 academic conversation structures are inherently differentiating because in a well-designed conversation, every other turn provides tailored oral input and every other turn pushes oral output. When I pair a WIDA Level 2 student with a Level 4, the conversation naturally calibrates \u2014 each student receives language at their level from a peer, not a one-size-fits-all lecture. I also use Zwiers\u2019 Stronger and Clearer Each Time protocol, where students rotate through successive partners and refine their ideas and language with each round \u2014 differentiation through iteration, not ability grouping.",
"For content access, I follow Walqui\u2019s principle: amplify, don\u2019t simplify. Within a Preparing, Interacting, Extending sequence, my Level 1\u20132 students might read from simplified sources while Level 4\u20135 students research independently \u2014 same content standard, same conversation prompt, different entry points. QSSSA stems ensure every student engages across all four WIDA domains: a newcomer fills in one word on the stem; a bridging student elaborates far beyond the frame. Zwiers reminds us to use sentence frames sparingly and remove them as soon as possible \u2014 the scaffold must never become a cage.",
"Translanguaging is what makes differentiation truly equitable. I seat same-L1 peers together for collaborative tasks, provide L1 graphic organizers for content processing, and explicitly encourage students to use their full linguistic repertoire during conversation. When students process evidence in Amharic or Spanish before presenting arguments in English, the quality of reasoning is visibly richer. As Ascenzi-Moreno\u2019s research confirms, translanguaging in formative assessment gives me a far more accurate picture of what students actually understand \u2014 not just what they can express in English on a given day."
]},
{question:"How do you support English learners?",sections:[2,3,4],guidance:"Lead with meaning-making from day one, then Zwiers\u2019 conversation structures and translanguaging as the integrated system.",
starters:[
"The most important thing I can do for English learners is ensure they are making meaning from day one \u2014 not waiting until their English \u2018catches up.\u2019 Zwiers has a principle I\u2019ve adopted completely: \u2018Don\u2019t teach language to teach language \u2014 teach something interesting and support the language for doing so.\u2019 Even beginning English learners should converse. The conversations will have fewer words, but with support, students can build grade-level ideas. I saw this firsthand: WIDA Level 1 and 2 students with eight different L1s debated the World Cup in English because the social motivation was authentic and the interaction structure gave them a framework to participate.",
"The structure comes from Zwiers\u2019 five conversation skills \u2014 building ideas, posing buildable ideas, clarifying, supporting with evidence, and evaluating. Each is a two-way skill: students learn to both prompt and respond. I teach these explicitly using hand gestures, idea-building cards, and observer-coaches. Then I scaffold with Walqui\u2019s approach: amplify the content and language demands rather than simplifying them. Graphic organizers, word walls, personal anchor charts, and co-constructed notes give students structured access to rigorous content across all four WIDA domains \u2014 reading, writing, listening, and speaking \u2014 while interaction ties them all together.",
"Translanguaging fuels the entire system for multilingual learners. I encourage students to use every word in their linguistic repertoire \u2014 L1, L2, everything. hooks would say a classroom that demands \u2018English only\u2019 asks students to leave part of themselves at the door \u2014 that\u2019s erasure, not education. When students use their home language in a scaffolded academic conversation, they\u2019re making meaning AND affirming their identity. Palmer and Mart\u00EDnez confirm that bolstering L1 leads to stronger L2 over time, and Baker and Wright show that all languages form one interconnected system. More words in the full repertoire means more fuel for meaning-making."
]},
{question:"How do you build relationships with students?",sections:[1,0,2],guidance:"Lead with relationships as the foundation for meaning-making, then Zwiers\u2019 ubuntu and hooks on community.",
starters:[
"Relationships are the foundation of meaning-making \u2014 students won\u2019t take the intellectual risks that genuine idea-building requires unless they feel genuinely known and valued. Every student I encounter is deserving of my time, my respect, my enthusiasm, and a smile \u2014 that\u2019s the inverse of \u2018respect is earned.\u2019 I catch up with students at the start of every class as human beings before I teach them content. I learn about their families, their interests, their languages. bell hooks insists the teacher must be a vulnerable participant, not a detached facilitator \u2014 that relational authenticity is what transforms a classroom from a room of strangers into a community of care.",
"Zwiers grounds this philosophically with the Bantu concept of ubuntu \u2014 a person becomes a person through other people. Face-to-face conversation builds empathy through mirroring another\u2019s mind. When students build ideas together, when they clarify each other\u2019s thinking, when they support each other with evidence \u2014 they\u2019re not just learning content. They\u2019re building the kind of relational trust that makes meaning-making possible. Zwiers\u2019 fifth mindset is \u2018I belong in this academic setting\u2019 \u2014 and daily interaction provides the connection that makes belonging real. I pair students strategically and keep pairs together for weeks so they develop genuine intellectual partnerships.",
"My case study student Miguel showed me why relationships unlock capacity. When I drew on Moll\u2019s Funds of Knowledge and used Miguel\u2019s passion for soccer \u2014 asking him to argue whether Messi or Ronaldo was better \u2014 he produced WIDA Level 5 argumentation that his general assessments never revealed. That\u2019s communicative competence theory in action: students perform at higher levels across all four domains when the topic matters to them and the relationship is real. Relationships don\u2019t just make students feel good; they\u2019re the foundation that allows meaning-making to happen."
]},
{question:"How do you assess student learning?",sections:[2,3,4],guidance:"Lead with assessing meaning-making through interaction, then Zwiers\u2019 WCW protocol and translanguaging in assessment.",
starters:[
"If meaning-making is the purpose of education, then assessment should measure whether students are actually making meaning \u2014 not just whether they can recall information. Zwiers\u2019 Write-Converse-Write protocol is my primary formative tool: students write individually, then converse in pairs, then write again. Comparing the pre and post writing isolates the impact of interaction on student thinking. The growth is often dramatic \u2014 the post-write is almost always richer, more nuanced, and more academically articulated. This shows me what students truly understand, not just what they can produce in isolation.",
"During conversations themselves, I assess meaning-making in real time. Are students building ideas or just exchanging answers? Are they using meta-conversation moves like \u2018Have we built up this idea enough?\u2019 or \u2018Let\u2019s consider the other side\u2019? Zwiers trains student observer-coaches using silent coaching cards \u2014 a third student observes, provides real-time feedback, and tracks which conversation skills are being used. This builds metacognitive awareness and peer assessment simultaneously. I also use QSSSA routines as daily checks across all four WIDA domains \u2014 reading the stem, writing a response, listening to a partner, speaking with evidence.",
"Crucially, I allow translanguaging in all formative assessment. As Ascenzi-Moreno\u2019s research confirms, when students can demonstrate understanding in their full linguistic repertoire, I get a far more accurate picture of their thinking. English-only assessment systematically underestimates multilingual learners \u2014 it measures English proficiency, not content understanding. My Fist of Five self-assessments revealed that students who produced correct academic stems still rated themselves low on confidence \u2014 telling me I needed to build self-efficacy alongside content mastery. Assessment should serve meaning-making, not replace it."
]},
{question:"How do you handle classroom management?",sections:[0,2,1],guidance:"Lead with meaning-making as the management system, then Zwiers\u2019 five mindsets and hooks on community.",
starters:[
"My classroom management philosophy is simple: when students are genuinely making meaning, there\u2019s very little to \u2018manage.\u2019 The best management system is a lesson where students are so engaged in building ideas that off-task behavior becomes structurally difficult. Zwiers\u2019 five conversation mindsets function as my behavioral architecture: \u2018We learn best by building up ideas\u2019 gives every activity a purpose. \u2018I respect, value, and learn from others\u2019 establishes norms. \u2018Conversations are powerful opportunities for me to shape and own what I learn\u2019 builds agency. \u2018I belong in this academic setting\u2019 creates safety.",
"The interaction structures themselves do the management work. When students have a clear prompt with an engaging purpose, a partner they\u2019re accountable to, specific conversation skills to practice, and an observer-coach tracking their moves, the energy in the room channels into productive academic talk. Zwiers\u2019 conversation structures aren\u2019t just language tools \u2014 they\u2019re interaction frameworks that give students something meaningful to do. I pair strategically and keep pairs together for weeks so they build continuing conversations and genuine intellectual partnership. Structure enables freedom, and meaningful interaction enables focus.",
"When issues do arise, I return to hooks and ubuntu: the classroom is a community of care where a person becomes a person through other people. I don\u2019t escalate \u2014 I reconnect. I remind students that they belong here, that our community needs their thinking. Students who feel genuinely known and valued \u2014 who have experienced the dignity of having their ideas built upon by a peer \u2014 rarely choose to disrupt that space. The foundation of management is meaning-making through interaction; the rest is just logistics."
]},
{question:"Describe a successful lesson.",sections:[5,2,4],guidance:"Show the meaning-making framework in action across all four WIDA domains. Use the TikTok Ban unit.",
starters:[
"I\u2019ll walk you through my TikTok Ban unit, which shows the meaning-making framework in action across all four WIDA domains. The Central Historical Question was \u2018Should the U.S. government ban TikTok?\u2019 This hits Zwiers\u2019 criteria for an effective prompt: it has an engaging purpose that requires building ideas, it creates a genuine need to talk because students bring different perspectives, and the expectations are clear \u2014 build up both sides before choosing. I Prepared students with a QSSSA bellringer connecting \u2018amending\u2019 to their own lives, which activated prior knowledge and forced academic vocabulary from minute one. Students were reading, writing, listening, and speaking before the main activity even began.",
"In the Interacting phase \u2014 where meaning-making happens most powerfully \u2014 I used Zwiers\u2019 collaborative argumentation approach: students \u2018parked\u2019 their opinions and built up ALL sides first, analyzing sources from Democrat, Republican, and Gen Z perspectives. I scaffolded access using Walqui\u2019s principle: amplify, don\u2019t simplify. My WIDA Level 1\u20132 students read from simplified sources while others researched independently \u2014 same content standard, different entry points. Students used Zwiers\u2019 idea-building structures: clarifying claims, supporting with text evidence, evaluating the weight of different arguments. I explicitly encouraged translanguaging \u2014 several groups processed evidence in Spanish and Amharic before building arguments in English. The reasoning was visibly richer when students could draw on their full linguistic repertoire.",
"In the Extending phase, I used Zwiers\u2019 Write-Converse-Write approach: students wrote argumentative paragraphs, then compared their pre and post thinking. 26 of 29 students demonstrated understanding, and nearly every student engaged verbally with academic vocabulary like \u2018federal jurisdiction\u2019 and \u2018executive authority.\u2019 The lesson worked because meaning-making was the purpose from the start: the prompt was buildable, interaction was the engine, scaffolding was the medium, and translanguaging was the fuel. Every WIDA domain was activated naturally \u2014 not as isolated skills, but as tools for making meaning together."
]},
{question:"How do you work with families?",sections:[6,1],guidance:"Lead with meaning-making extending beyond the classroom, then Moll\u2019s Funds of Knowledge and your family interview research.",
starters:[
"Meaning-making doesn\u2019t stop at the classroom door, and families are essential partners in the work. Zwiers\u2019 fifth mindset \u2014 \u2018I belong in this academic setting\u2019 \u2014 needs to extend to parents and caregivers. In my graduate research, I interviewed an Indian-American Muslim family where the mother, Aiza, told me it took several children going through the system before she understood how American schools worked. That should never be necessary. Moll\u2019s Funds of Knowledge research shows that families carry rich intellectual and cultural resources that schools systematically ignore \u2014 and when we tap into those funds, the relationship transforms from compliance to partnership.",
"I advocate for three concrete structures: parent liaison positions staffed by experienced immigrant parents who can bridge the cultural gap, town hall information nights specifically designed for English learner families, and Funds of Knowledge training for all teachers \u2014 not just ESOL staff \u2014 so every educator sees the resources families carry. If we expect students to bring their full selves to the classroom, to take the intellectual risks that meaning-making demands, we need families to trust the institution enough to let that happen.",
"In my own practice, I extend Zwiers\u2019 idea-building beyond the classroom walls. I send home discussion prompts that invite family conversations in any language \u2014 when students bring back what their families shared, that knowledge enters our academic conversations as evidence. This is translanguaging at the community level: families\u2019 linguistic and cultural resources fueling classroom meaning-making. Aiza said it best: \u2018At the end of the day, it\u2019s about being a good human being.\u2019 Family engagement is about humility, genuine partnership, and recognizing that students\u2019 first and most important teachers are at home."
]},
{question:"What\u2019s your approach to vocabulary instruction?",sections:[2,3,4],guidance:"Lead with meaning-making driving language development, then Zwiers\u2019 ELD principle and translanguaging.",
starters:[
"Vocabulary develops through meaning-making, not through memorization. Zwiers\u2019 key ELD principle shapes my entire approach: \u2018Don\u2019t teach language to teach language \u2014 teach something interesting and support the language for doing so.\u2019 In academic conversations, every other turn provides tailored oral input and every other turn pushes oral output. Words stick because they are used purposefully \u2014 not because they\u2019re on a vocabulary list. When students encounter \u2018federal jurisdiction\u2019 while debating TikTok, they learn it because they need it to build their argument. That\u2019s meaning-making driving language development across all four WIDA domains simultaneously.",
"I use QSSSA stems to embed vocabulary production within structured interaction. The stem might be \u2018The evidence suggests that ___\u2019 \u2014 every student uses the academic phrase while filling in their own thinking. This engages reading the stem, writing a response, listening to a partner\u2019s answer, and speaking with evidence \u2014 all driven by the need to make meaning about content that matters. Zwiers recommends using sentence frames sparingly and removing them as soon as possible \u2014 the scaffold must never become a cage. I also maintain word walls and personal anchor charts, and I\u2019m especially attentive to multiple meanings: my CATA training taught me that a word like \u2018execute\u2019 means something very different in government class than in everyday English.",
"Translanguaging supercharges vocabulary development because it expands the total repertoire available for meaning-making. Cognates are a powerful bridge \u2014 a Spanish-speaking student who knows \u2018constituci\u00F3n\u2019 is already partway to \u2018Constitution.\u2019 I encourage L1 processing, personal bilingual glossaries, and translanguaging during conversation. Baker and Wright\u2019s research confirms that languages form one interconnected system, not separate containers. More words in the full repertoire means more fuel for building academic ideas. Gibbons adds that peer-to-peer academic discourse develops vocabulary in ways that teacher-to-student talk simply cannot replicate."
]},
{question:"Where do you see education heading?",sections:[6,2],guidance:"Lead with the meaning-making paradigm shift, then Zwiers on conversation-rich schools and bilingual education as the structural extension.",
starters:[
"Education needs a paradigm shift toward meaning-making as its core purpose, with interaction as the engine that drives it. In most classrooms today, high-quality student-to-student conversations remain rare \u2014 especially with linguistically and culturally diverse students, who disproportionately receive basic, direct instruction that Freire would recognize as the banking model. Zwiers calls conversation-rich teaching the approach that many resist because they don\u2019t see a direct line to test scores. But as he puts it, conversation evolved to solve problems, build ideas, build relationships, and understand others \u2014 not to help people choose right answers on tests. That\u2019s the shift I want to be part of.",
"The structural extension is bilingual education. Collier and Thomas\u2019s data is unambiguous: ESL pull-out produces 11th percentile outcomes; two-way bilingual immersion produces 50th percentile by middle school and 70th by graduation. If translanguaging is the fuel for meaning-making \u2014 if Zwiers\u2019 own framework depends on students bringing their full linguistic repertoire to idea-building \u2014 then building a system that structurally supports bilingualism is the logical next step. We need bilingual programs, not as experiments, but as the evidence-based standard. All four WIDA domains develop more powerfully when students can draw on their complete linguistic resources.",
"Zwiers also reminds us this is a long game \u2014 \u2018not a quick fix with a few easy steps or a scripted curriculum.\u2019 It requires schoolwide agreement on the value of conversations, professional learning communities focused on conversation quality, and a willingness to be patient with messy student talk while it develops into something powerful. hooks asks: are we willing to be changed by our students? That\u2019s the future I want \u2014 classrooms where meaning is built through genuine interaction, not deposited through lecture, and where every language a student speaks is fuel for that building."
]},
{question:"What theoretical frameworks inform your practice?",sections:[0,2],guidance:"Lead with meaning-making as the organizing principle, then Zwiers as primary authority on interaction, and how all theorists connect.",
starters:[
"My practice is organized around a single principle: meaning-making is the purpose of education, and interaction is its primary engine. Freire\u2019s critique of the banking model explains why lecture-and-test fails \u2014 it suppresses the meaning-making that genuine dialogue unleashes. hooks adds the relational conditions: the teacher must be a vulnerable participant, the classroom must be a community of care, and education must affirm students\u2019 wholeness. Together they establish the why. But the question has always been: what does meaning-making actually look like in a classroom? That\u2019s where Zwiers becomes my primary authority.",
"Jeff Zwiers identifies interaction as a 5th domain of language use alongside reading, writing, listening, and speaking \u2014 and I believe it\u2019s the missing piece in most classrooms. His five conversation skills \u2014 building ideas, posing buildable ideas, clarifying, supporting with evidence, and evaluating \u2014 give me a concrete, teachable framework for what \u2018student-centered learning\u2019 looks like in real time. Each is a two-way skill that students must learn to both prompt and respond to. Zwiers\u2019 concept of ubuntu \u2014 a person becomes a person through other people \u2014 bridges directly to hooks\u2019 vision of community. His work gives the meaning-making philosophy its operational architecture.",
"Walqui provides the scaffolding principle \u2014 amplify, don\u2019t simplify \u2014 that makes interaction accessible across proficiency levels. Vygotsky\u2019s ZPD is the theoretical space; Walqui\u2019s scaffolding is the structure; Zwiers\u2019 conversation skills are what fill that structure with meaning-making. Gibbons confirms that peer-to-peer academic discourse is irreplaceable \u2014 it cannot be replicated in teacher-to-student talk. And translanguaging research from Baker and Wright, Palmer and Mart\u00EDnez, and Yilmaz ensures every student can deploy their full linguistic repertoire inside these structures. The framework is coherent because every piece serves meaning-making, and interaction is the engine that connects them all."
]},
{question:"How do you promote equity in the classroom?",sections:[6,4,1],guidance:"Lead with who gets to make meaning, then Zwiers on conversation as the equity corrective, translanguaging and systemic advocacy.",
starters:[
"Equity begins with who gets to make meaning. Freire showed us that the banking model doesn\u2019t just fail students \u2014 it silences them. And that silencing falls disproportionately on culturally and linguistically diverse students, who Zwiers notes still receive basic, direct instruction while their peers engage in richer learning. Academic conversations are the corrective. When students build ideas together \u2014 when a newcomer\u2019s clarifying question sharpens a fluent speaker\u2019s argument, when a Level 2 student\u2019s L1 evidence gets translated and strengthens the group\u2019s claim \u2014 the hierarchy of who \u2018knows more\u2019 dissolves. Zwiers invokes ubuntu: a person becomes a person through other people. Equity isn\u2019t something I add to my teaching; it\u2019s embedded in the architecture of interaction itself.",
"At the linguistic level, equity means translanguaging. hooks insists that education must affirm the wholeness of each student \u2014 a classroom that demands \u2018English only\u2019 asks students to leave part of themselves at the door. That\u2019s erasure, not education. When I allow students to process in their L1, build evidence in their L1, and demonstrate understanding in their full repertoire, I\u2019m not lowering the bar \u2014 I\u2019m removing an artificial barrier that has nothing to do with whether they can build a powerful idea. My CATA analysis found a \u2018third-grade\u2019 textbook reading at 8th-grade level that omitted the Three-Fifths Clause entirely \u2014 that\u2019s both a linguistic and a content equity issue.",
"At the systemic level, I advocate for bilingual education because the data demands it: Collier and Thomas show ESL pull-out produces 11th percentile outcomes while two-way bilingual produces 70th by graduation. If meaning-making is the purpose and interaction is the engine, then a system that develops and honors students\u2019 full linguistic resources is the structural extension of everything I believe. Equity means examining every level \u2014 the interaction, the curriculum, and the system \u2014 and asking hooks\u2019 ultimate question: are we willing to be changed by our students?"
]}
];

function App(){
const[active,setActive]=useState(0);
const[showTable,setShowTable]=useState(true);
const[expandedQs,setExpandedQs]=useState(new Set());
const detailRef=useRef(null);
const s=SECTIONS[active];

function selectSection(i){
setActive(i);
setTimeout(()=>{if(detailRef.current)detailRef.current.scrollIntoView({behavior:"smooth",block:"start"})},100);
}

function toggleQ(i){
setExpandedQs(prev=>{const n=new Set(prev);n.has(i)?n.delete(i):n.add(i);return n});
}

return <div style={{padding:"24px 16px"}}>
<div style={{maxWidth:"900px",margin:"0 auto"}}>

{/* Header */}
<div style={{textAlign:"center",marginBottom:"28px"}}>
<p style={{fontSize:"10px",fontWeight:800,letterSpacing:"2.5px",color:"#C4880D",textTransform:"uppercase",margin:"0 0 6px"}}>Interview Prep</p>
<h1 style={{fontSize:"26px",fontWeight:800,color:"#1a1a2e",margin:"0 0 8px",lineHeight:1.2}}>Meaning-Making as the Purpose of Education</h1>
<p style={{fontSize:"13px",color:"#888",margin:0,lineHeight:1.6,maxWidth:"640px",marginLeft:"auto",marginRight:"auto"}}>A coherent framework weaving together Freire, hooks, Vygotsky, Walqui, Zwiers & translanguaging &mdash; synthesized from 17 graduate papers</p>
</div>

{/* Framework at a Glance */}
<div style={{background:"#fff",borderRadius:"14px",border:"1px solid #e8e8e8",padding:"16px 20px",marginBottom:"20px"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:showTable?"12px":"0"}}>
<p style={{fontSize:"10px",fontWeight:800,letterSpacing:"1px",color:"#aaa",textTransform:"uppercase",margin:0}}>The Framework at a Glance</p>
<button onClick={()=>setShowTable(!showTable)} style={{background:"none",border:"none",fontSize:"10px",fontWeight:700,color:"#C4880D",textTransform:"uppercase",letterSpacing:"1px"}}>{showTable?"\u25BE Hide":"\u25B8 Show"}</button>
</div>
{showTable&&<div style={{overflowX:"auto"}}>
<table style={{width:"100%",borderCollapse:"collapse"}}>
<thead><tr>
<th style={{padding:"8px 12px",fontSize:"10px",fontWeight:700,color:"#aaa",textTransform:"uppercase",letterSpacing:"1px",textAlign:"left",borderBottom:"2px solid #eee"}}>Component</th>
<th style={{padding:"8px 12px",fontSize:"10px",fontWeight:700,color:"#aaa",textTransform:"uppercase",letterSpacing:"1px",textAlign:"left",borderBottom:"2px solid #eee"}}>Role</th>
<th style={{padding:"8px 12px",fontSize:"10px",fontWeight:700,color:"#aaa",textTransform:"uppercase",letterSpacing:"1px",textAlign:"left",borderBottom:"2px solid #eee"}}>Theorists</th>
</tr></thead>
<tbody>{FRAMEWORK_TABLE.map((row,i)=>{
const sec=SECTIONS[row.sectionIdx];
return <tr key={i} onClick={()=>selectSection(row.sectionIdx)} style={{cursor:"pointer",background:active===row.sectionIdx?sec.lightBg:"transparent",transition:"all 0.2s"}}>
<td style={{padding:"8px 12px",fontSize:"13px",fontWeight:700,color:sec.color,borderBottom:"1px solid #f0f0f0"}}>{sec.icon} {row.component}</td>
<td style={{padding:"8px 12px",fontSize:"12px",fontStyle:"italic",color:"#888",borderBottom:"1px solid #f0f0f0"}}>{row.role}</td>
<td style={{padding:"8px 12px",fontSize:"12px",color:"#666",borderBottom:"1px solid #f0f0f0"}}>{row.theorists}</td>
</tr>})}</tbody>
</table>
<p style={{margin:"8px 0 0",fontSize:"10px",color:"#ccc",fontStyle:"italic",textAlign:"center"}}>Click any row to jump to that section</p>
</div>}
</div>

{/* Section Pills */}
<div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"20px"}}>
{SECTIONS.map((sec,i)=><button key={sec.name} onClick={()=>selectSection(i)} style={{
display:"flex",alignItems:"center",gap:"6px",padding:"9px 14px",
background:active===i?sec.color:"#fff",
color:active===i?"#fff":sec.color,
border:"2px solid "+(active===i?sec.color:"#e0e0e0"),
borderRadius:"10px",fontSize:"12px",
fontWeight:active===i?800:600,
boxShadow:active===i?"0 3px 12px "+sec.color+"30":"none",
transition:"all 0.2s",whiteSpace:"nowrap"
}}>
<span style={{fontSize:"14px"}}>{sec.icon}</span>
<span>{sec.name}</span>
</button>)}
</div>

{/* Section Detail */}
<div ref={detailRef}>
<SectionDetail section={s}/>
</div>

{/* Question Mapper */}
<div style={{marginTop:"28px",background:"#fff",borderRadius:"14px",border:"1px solid #e8e8e8",padding:"20px 24px"}}>
<p style={{fontSize:"10px",fontWeight:800,letterSpacing:"1px",color:"#aaa",textTransform:"uppercase",margin:"0 0 4px"}}>Map Any Question</p>
<p style={{fontSize:"12px",color:"#888",lineHeight:1.6,margin:"0 0 16px"}}>Common interview questions mapped to your framework. Click a question to see which sections to pull from, then click a section pill to jump there.</p>
{QUESTION_MAP.map((q,qi)=>{
const isOpen=expandedQs.has(qi);
return <div key={qi} style={{borderBottom:qi<QUESTION_MAP.length-1?"1px solid #f0f0f0":"none",padding:"10px 0"}}>
<button onClick={()=>toggleQ(qi)} style={{background:"none",border:"none",width:"100%",textAlign:"left",display:"flex",alignItems:"center",gap:"8px",padding:"4px 0"}}>
<span style={{fontSize:"12px",color:"#C4880D",fontWeight:700,minWidth:"16px"}}>{isOpen?"\u25BE":"\u25B8"}</span>
<span style={{fontSize:"13px",fontWeight:600,color:"#1a1a2e",lineHeight:1.4}}>{q.question}</span>
</button>
{isOpen&&<div style={{paddingLeft:"24px",paddingTop:"8px"}}>
<div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"8px"}}>
{q.sections.map(si=><button key={si} onClick={()=>selectSection(si)} style={{
display:"inline-flex",alignItems:"center",gap:"4px",padding:"4px 10px",
background:SECTIONS[si].color+"15",color:SECTIONS[si].color,
border:"1px solid "+SECTIONS[si].color+"33",borderRadius:"6px",
fontSize:"11px",fontWeight:600,transition:"all 0.2s"
}}>{SECTIONS[si].icon} {SECTIONS[si].name}</button>)}
</div>
<p style={{fontSize:"12px",color:"#666",lineHeight:1.6,margin:"0 0 10px",fontStyle:"italic"}}>{q.guidance}</p>
{q.starters&&q.starters.length>0&&<div style={{display:"flex",flexDirection:"column",gap:"8px",marginTop:"10px"}}>
<p style={{fontSize:"9px",fontWeight:700,color:"#C4880D",textTransform:"uppercase",letterSpacing:"1.5px",margin:0}}>Answer Starters</p>
{q.starters.map((st,si)=><div key={si} style={{background:"#fafafa",borderRadius:"8px",padding:"10px 14px",borderLeft:"3px solid #C4880D33"}}>
<p style={{margin:0,fontSize:"12px",color:"#444",lineHeight:1.7}}>{st}</p>
</div>)}
</div>}
</div>}
</div>})}
</div>

{/* Footer */}
<p style={{textAlign:"center",fontSize:"10px",color:"#ccc",marginTop:"16px"}}>Synthesized from 17 graduate papers &mdash; George Mason University ESOL Endorsement Program &mdash; 2022&ndash;2024</p>

</div></div>
}

function SectionDetail({section}){
const s=section;
const[showTheory,setShowTheory]=useState(true);
const[showHooks,setShowHooks]=useState(true);
const[showEvidence,setShowEvidence]=useState(false);
const[showQuotes,setShowQuotes]=useState(true);

return <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #e8e8e8",overflow:"hidden"}}>

{/* Header */}
<div style={{background:"linear-gradient(135deg,"+s.color+","+s.color+"cc)",padding:"22px 26px",color:"#fff"}}>
<div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}}>
<span style={{fontSize:"10px",fontWeight:700,background:"rgba(255,255,255,0.25)",padding:"3px 10px",borderRadius:"6px",letterSpacing:"1px",textTransform:"uppercase"}}>{s.role}</span>
</div>
<h3 style={{margin:"6px 0 4px",fontSize:"22px",fontWeight:800}}>{s.icon} {s.name}</h3>
<p style={{margin:0,fontSize:"12px",opacity:0.9}}>{s.theorists}</p>
</div>

<div style={{padding:"24px 26px"}}>

{/* Core Position - always visible */}
<p style={{fontSize:"10px",fontWeight:700,color:"#bbb",textTransform:"uppercase",letterSpacing:"1.5px",margin:"0 0 8px"}}>Core Position</p>
<div style={{background:"linear-gradient(135deg,"+s.lightBg+",#fff)",borderRadius:"10px",padding:"18px 22px",borderLeft:"4px solid "+s.color,marginBottom:"20px"}}>
<p style={{margin:0,fontSize:"14px",color:"#444",lineHeight:1.75}}>{s.corePosition}</p>
</div>

{/* Theoretical Backing */}
<button onClick={()=>setShowTheory(!showTheory)} style={{background:"none",border:"none",padding:0,fontSize:"10px",fontWeight:700,color:s.color,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:"8px",display:"flex",alignItems:"center",gap:"6px"}}>{showTheory?"\u25BE":"\u25B8"} Theoretical Backing</button>
{showTheory&&<div style={{display:"flex",flexDirection:"column",gap:"6px",marginBottom:"20px"}}>
{s.theoreticalBacking.map((t,i)=><div key={i} style={{display:"flex",gap:"10px",alignItems:"flex-start",padding:"10px 14px",background:i%2===0?"#fafafa":"#fff",borderRadius:"8px"}}>
<span style={{color:s.color,fontWeight:700,fontSize:"14px",marginTop:"1px"}}>{"\u25B9"}</span>
<div>
<span style={{fontWeight:700,color:s.color,fontSize:"13px"}}>{t.theorist}</span>
{t.work&&<span style={{fontSize:"12px",color:"#888",fontStyle:"italic"}}> &mdash; {t.work}</span>}
<p style={{margin:"4px 0 0",fontSize:"12px",color:"#555",lineHeight:1.6}}>{t.idea}</p>
</div>
</div>)}
</div>}

{/* hooks Connection */}
<button onClick={()=>setShowHooks(!showHooks)} style={{background:"none",border:"none",padding:0,fontSize:"10px",fontWeight:700,color:s.color,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:"8px",display:"flex",alignItems:"center",gap:"6px"}}>{showHooks?"\u25BE":"\u25B8"} Bell hooks Connection</button>
{showHooks&&<div style={{background:s.color+"08",borderRadius:"10px",padding:"16px 20px",border:"1px dashed "+s.color+"44",marginBottom:"20px"}}>
<p style={{margin:0,fontSize:"13px",color:"#444",lineHeight:1.75,fontStyle:"italic"}}>{s.hooksConnection}</p>
</div>}

{/* Classroom Evidence */}
<button onClick={()=>setShowEvidence(!showEvidence)} style={{background:"none",border:"none",padding:0,fontSize:"10px",fontWeight:700,color:s.color,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:"8px",display:"flex",alignItems:"center",gap:"6px"}}>{showEvidence?"\u25BE":"\u25B8"} Classroom Evidence</button>
{showEvidence&&<div style={{display:"flex",flexDirection:"column",gap:"8px",marginBottom:"20px"}}>
{s.classroomEvidence.map((e,i)=><div key={i} style={{display:"flex",gap:"10px",alignItems:"flex-start",padding:"10px 14px",background:"#fafafa",borderRadius:"8px"}}>
<span style={{background:s.color,color:"#fff",padding:"3px 10px",borderRadius:"6px",fontSize:"9px",fontWeight:700,whiteSpace:"nowrap",marginTop:"2px"}}>{e.label}</span>
<p style={{margin:0,fontSize:"12px",color:"#555",lineHeight:1.6}}>{e.detail}</p>
</div>)}
</div>}

{/* Interview-Ready Quotes */}
<button onClick={()=>setShowQuotes(!showQuotes)} style={{background:"none",border:"none",padding:0,fontSize:"10px",fontWeight:700,color:s.color,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:"8px",display:"flex",alignItems:"center",gap:"6px"}}>{showQuotes?"\u25BE":"\u25B8"} Interview-Ready Quotes</button>
{showQuotes&&<div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
{s.interviewQuotes.map((q,i)=><div key={i} style={{background:"#fff",border:"1px solid "+s.color+"33",padding:"10px 16px",borderRadius:"10px"}}>
<p style={{margin:0,fontSize:"13px",color:"#555",lineHeight:1.6,fontStyle:"italic"}}>{q}</p>
</div>)}
</div>}

</div>
</div>
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
