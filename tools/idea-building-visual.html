<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idea-Building Visual Conversations</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #fff;
    padding: 30px 20px;
  }

  .screen-only {
    text-align: center;
    margin-bottom: 20px;
  }
  .screen-only h1 { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  .screen-only p { font-size: 12px; color: #888; margin-bottom: 10px; }
  .print-btn {
    padding: 8px 24px;
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }

  .page {
    max-width: 760px;
    margin: 0 auto;
  }

  .title {
    text-align: center;
    font-size: 16px;
    font-weight: 800;
    color: #1a6b35;
    margin-bottom: 16px;
  }

  /* Outer frame — hand-drawn look */
  .frame {
    border: 3px solid #222;
    border-radius: 6px;
    padding: 0;
    position: relative;
  }

  /* IDEA box at top */
  .idea-box {
    border-bottom: 2.5px solid #2a6cb8;
    padding: 18px 24px 22px;
    min-height: 130px;
  }
  .idea-label {
    font-size: 20px;
    font-weight: 800;
    color: #1a1a2e;
    text-align: center;
    margin-bottom: 8px;
  }

  /* Building blocks grid */
  .blocks {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-template-rows: repeat(3, 1fr);
    min-height: 340px;
  }

  .block {
    border: 1.5px solid #2a6cb8;
    min-height: 0;
  }

  /* Row 1: 3 blocks roughly equal with slight variation */
  .b1 { grid-column: 1 / 5; grid-row: 1; }
  .b2 { grid-column: 5 / 8; grid-row: 1; }
  .b3 { grid-column: 8 / 13; grid-row: 1; }

  /* Row 2: 2 blocks */
  .b4 { grid-column: 1 / 4; grid-row: 2; }
  .b5 { grid-column: 4 / 9; grid-row: 2; }
  .b6 { grid-column: 9 / 13; grid-row: 2; }

  /* Row 3: offset blocks */
  .b7 { grid-column: 1 / 6; grid-row: 3; }
  .b8 { grid-column: 6 / 9; grid-row: 3; }
  .b9 { grid-column: 9 / 13; grid-row: 3; }

  /* Name/Date */
  .meta-line {
    display: flex;
    gap: 30px;
    margin-top: 20px;
    justify-content: center;
  }
  .meta-field {
    font-size: 12px;
    font-weight: 600;
    color: #555;
  }
  .meta-blank {
    display: inline-block;
    width: 160px;
    border-bottom: 1px solid #ccc;
    margin-left: 6px;
  }
  .meta-blank.wide { width: 220px; }

  @media print {
    body { padding: 0.4in; }
    .screen-only { display: none; }
  }
  @page {
    margin: 0.5in;
    size: portrait;
  }
</style>
</head>
<body>

<div class="screen-only">
  <h1>Idea-Building Visual Conversations</h1>
  <p>Blank graphic organizer &mdash; print or save as PDF</p>
  <button class="print-btn" onclick="window.print()">Print / Save as PDF</button>
</div>

<div class="page">
  <div class="title">Idea-Building Visual Conversations (Social Study/History)</div>

  <div class="frame">
    <div class="idea-box">
      <div class="idea-label">IDEA</div>
    </div>

    <div class="blocks">
      <div class="block b1"></div>
      <div class="block b2"></div>
      <div class="block b3"></div>
      <div class="block b4"></div>
      <div class="block b5"></div>
      <div class="block b6"></div>
      <div class="block b7"></div>
      <div class="block b8"></div>
      <div class="block b9"></div>
    </div>
  </div>

  <div class="meta-line">
    <div class="meta-field">Name: <span class="meta-blank"></span></div>
    <div class="meta-field">Date: <span class="meta-blank"></span></div>
    <div class="meta-field">Topic: <span class="meta-blank wide"></span></div>
  </div>
</div>

</body>
</html>
